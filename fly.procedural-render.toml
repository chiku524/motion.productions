# Procedural render HTTP service — Video AI engine=procedural bridge.
# Deploy from repository root:
#   fly apps create motion-procedural-render
#   fly secrets set MOTION_API_SECRET=... -a motion-procedural-render
#   fly deploy --config fly.procedural-render.toml
#
# Worker: wrangler secret put PROCEDURAL_RENDER_URL  (https://motion-procedural-render.fly.dev)
app = "motion-procedural-render"
primary_region = "iad"

kill_signal = "SIGTERM"
kill_timeout = 180

[build]
  dockerfile = "Dockerfile"

[deploy]
  wait_timeout = "10m"

[env]
  WORKER_START_SCRIPT = "procedural_render"
  HEALTH_PORT = "8080"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 1
    hard_limit = 2

  [[http_service.checks]]
    grace_period = "60s"
    interval = "60s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
