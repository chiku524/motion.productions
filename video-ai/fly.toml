# Fly.io: run `fly launch` from repo root with --dockerfile video-ai/Dockerfile
# or `cd video-ai && fly launch` after copying this file; see README.
app = "motion-video-ai-render"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
