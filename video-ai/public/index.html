<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Video AI (side project)</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0c0c10;
        --fg: #e8e8ef;
        --muted: #9898a8;
        --accent: #6c9eff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: var(--bg);
        color: var(--fg);
        line-height: 1.5;
      }
      main {
        max-width: 42rem;
        margin: 0 auto;
        padding: 2rem 1.25rem 4rem;
      }
      h1 {
        font-size: 1.35rem;
        font-weight: 600;
        margin: 0 0 0.35rem;
      }
      p.lead {
        margin: 0 0 1.5rem;
        color: var(--muted);
        font-size: 0.95rem;
      }
      label {
        display: block;
        font-size: 0.8rem;
        color: var(--muted);
        margin-bottom: 0.35rem;
      }
      textarea,
      input {
        width: 100%;
        border-radius: 10px;
        border: 1px solid #2a2a36;
        background: #14141c;
        color: var(--fg);
        padding: 0.65rem 0.75rem;
        font: inherit;
      }
      textarea {
        min-height: 7rem;
        resize: vertical;
      }
      .row {
        display: grid;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }
      @media (min-width: 520px) {
        .row.two {
          grid-template-columns: 1fr 1fr;
        }
      }
      button {
        appearance: none;
        border: 0;
        border-radius: 10px;
        padding: 0.65rem 1rem;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        background: var(--accent);
        color: #0a0a10;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 1rem;
      }
      pre {
        margin: 1rem 0 0;
        padding: 1rem;
        border-radius: 10px;
        background: #101018;
        border: 1px solid #242432;
        overflow: auto;
        font-size: 0.78rem;
        max-height: 22rem;
      }
      .status {
        margin-top: 0.75rem;
        font-size: 0.85rem;
        color: var(--muted);
      }
      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Video AI</h1>
      <p class="lead">
        Prompt → recipe JSON (Worker) → MP4 (local FFmpeg render). See
        <code>video-ai/README.md</code> for architecture and merge notes.
      </p>

      <form id="f">
        <label for="prompt">Prompt</label>
        <textarea id="prompt" name="prompt" placeholder="Describe the vibe, message, and pacing…"></textarea>
        <div class="row two">
          <div>
            <label for="target">Target duration (sec)</label>
            <input id="target" name="target" type="number" min="4" max="600" value="32" />
          </div>
          <div>
            <label for="max">Max duration cap (sec)</label>
            <input id="max" name="max" type="number" min="8" max="600" value="120" />
          </div>
        </div>
        <div class="actions">
          <button type="submit" id="planBtn">Plan (recipe)</button>
          <button type="button" id="renderBtn" disabled>Render MP4</button>
        </div>
      </form>

      <p class="status" id="status"></p>
      <pre id="out" hidden></pre>
    </main>
    <script>
      const $ = (id) => document.getElementById(id);
      const statusEl = $("status");
      const outEl = $("out");
      const renderBtn = $("renderBtn");
      let lastRecipe = null;

      function setStatus(t) {
        statusEl.textContent = t || "";
      }

      async function plan(ev) {
        ev.preventDefault();
        const prompt = $("prompt").value.trim();
        if (!prompt) {
          setStatus("Enter a prompt.");
          return;
        }
        const targetDurationSec = Number($("target").value || 32);
        const maxDurationSec = Number($("max").value || 120);
        outEl.hidden = true;
        renderBtn.disabled = true;
        lastRecipe = null;
        setStatus("Planning…");
        $("planBtn").disabled = true;
        try {
          const res = await fetch("/api/plan", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt, targetDurationSec, maxDurationSec }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || res.statusText);
          lastRecipe = data.recipe;
          outEl.textContent = JSON.stringify({ source: data.source, recipe: data.recipe }, null, 2);
          outEl.hidden = false;
          renderBtn.disabled = false;
          setStatus(`Recipe ready (${data.source}).`);
        } catch (e) {
          setStatus(String(e.message || e));
        } finally {
          $("planBtn").disabled = false;
        }
      }

      async function render() {
        if (!lastRecipe) return;
        setStatus("Rendering (may take a bit)…");
        renderBtn.disabled = true;
        try {
          let res = await fetch("/api/render", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ recipe: lastRecipe }),
          });
          if (res.status === 501) {
            res = await fetch("http://127.0.0.1:8788/render", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ recipe: lastRecipe }),
            });
          }
          if (!res.ok) {
            const t = await res.text();
            throw new Error(t || res.statusText);
          }
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "video-ai-output.mp4";
          a.click();
          URL.revokeObjectURL(url);
          setStatus("Download started.");
        } catch (e) {
          setStatus(String(e.message || e));
        } finally {
          renderBtn.disabled = false;
        }
      }

      $("f").addEventListener("submit", plan);
      renderBtn.addEventListener("click", render);
    </script>
  </body>
</html>
