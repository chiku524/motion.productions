# Explorer loop — 100% explore, frame extraction. Deploy from repository root:
#   fly apps create motion-loop-explorer   # first time only
#   fly deploy --config fly.loop-explorer.toml
#
# Set secrets only if your API requires auth headers (unusual for this project).
app = "motion-loop-explorer"
primary_region = "iad"

kill_signal = "SIGTERM"
kill_timeout = 120

[build]
  dockerfile = "Dockerfile"

[deploy]
  wait_timeout = "10m"

[env]
  API_BASE = "https://motion.productions"
  LOOP_EXTRACTION_FOCUS = "frame"
  LOOP_EXPLOIT_RATIO_OVERRIDE = "0"
  LOOP_WORKFLOW_TYPE = "explorer"
  LOOP_WORKER_OFFSET_SECONDS = "0"
  HEALTH_PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 2
    hard_limit = 4

  [[http_service.checks]]
    grace_period = "45s"
    interval = "60s"
    method = "GET"
    timeout = "5s"
    path = "/"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
