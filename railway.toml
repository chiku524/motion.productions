# Railway: Background Worker for self-feeding learning loop
# https://docs.railway.app/config-as-code
# Uses Dockerfile when present; Root Directory must be repo root (not cloudflare/)
#
# Do NOT set deploy.startCommand here: it applies to every service in the project, including
# non-Python images (e.g. Dockerfile.video-ai / Video AI render), and overrides Dockerfile CMD.
# Python workers use Dockerfile CMD → railway_start.py; per-service script = RAILWAY_START_SCRIPT env.
#   - unset or "automate_loop" → automate_loop.py
#   - "sound_loop"             → sound_loop.py
#   - "interpret_loop"         → interpret_loop.py

[build]
builder = "DOCKERFILE"
