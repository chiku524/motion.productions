# Web jobs — polls pending UI/API jobs and runs generate_bridge (procedural).
# Deploy from repository root:
#   fly apps create motion-loop-webjobs   # first time only
#   fly secrets set MOTION_API_SECRET=... -a motion-loop-webjobs
#   fly deploy --config fly.loop-webjobs.toml
#
app = "motion-loop-webjobs"
primary_region = "iad"

kill_signal = "SIGTERM"
kill_timeout = 120

[build]
  dockerfile = "Dockerfile"

[deploy]
  wait_timeout = "10m"

[env]
  API_BASE = "https://motion.productions"
  WORKER_START_SCRIPT = "generate_bridge"
  HEALTH_PORT = "8080"
  BRIDGE_INTERVAL_SECONDS = "20"
  BRIDGE_LEARN = "1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 2
    hard_limit = 4

  [[http_service.checks]]
    grace_period = "45s"
    interval = "60s"
    method = "GET"
    timeout = "5s"
    path = "/"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
