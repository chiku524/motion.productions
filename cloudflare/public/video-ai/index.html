<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Video AI lab — Motion</title>
    <meta name="description" content="Experimental prompt-to-recipe-to-video lab. Part of motion.productions." />
    <link rel="canonical" href="https://motion.productions/video-ai/" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0c0c10;
        --fg: #e8e8ef;
        --muted: #9898a8;
        --accent: #6c9eff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: var(--bg);
        color: var(--fg);
        line-height: 1.5;
      }
      main {
        max-width: 42rem;
        margin: 0 auto;
        padding: 2rem 1.25rem 4rem;
      }
      .back {
        margin: 0 0 1.25rem;
        font-size: 0.875rem;
      }
      .back a {
        color: var(--accent);
        text-decoration: none;
      }
      .back a:hover {
        text-decoration: underline;
      }
      h1 {
        font-size: 1.35rem;
        font-weight: 600;
        margin: 0 0 0.35rem;
      }
      p.lead {
        margin: 0 0 1.5rem;
        color: var(--muted);
        font-size: 0.95rem;
      }
      label {
        display: block;
        font-size: 0.8rem;
        color: var(--muted);
        margin-bottom: 0.35rem;
      }
      textarea,
      input {
        width: 100%;
        border-radius: 10px;
        border: 1px solid #2a2a36;
        background: #14141c;
        color: var(--fg);
        padding: 0.65rem 0.75rem;
        font: inherit;
      }
      textarea {
        min-height: 7rem;
        resize: vertical;
      }
      .row {
        display: grid;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }
      @media (min-width: 520px) {
        .row.two {
          grid-template-columns: 1fr 1fr;
        }
      }
      button {
        appearance: none;
        border: 0;
        border-radius: 10px;
        padding: 0.65rem 1rem;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        background: var(--accent);
        color: #0a0a10;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 1rem;
      }
      pre {
        margin: 1rem 0 0;
        padding: 1rem;
        border-radius: 10px;
        background: #101018;
        border: 1px solid #242432;
        overflow: auto;
        font-size: 0.78rem;
        max-height: 22rem;
      }
      .status {
        margin-top: 0.75rem;
        font-size: 0.85rem;
        color: var(--muted);
      }
      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="back"><a href="/">← Motion home</a></p>
      <h1>Video AI lab</h1>
      <p class="lead">
        Experimental side project: prompt → recipe JSON on this Worker (<code>/video-ai/api/</code>) → MP4 via FFmpeg.
        Use <strong>Queue job (R2)</strong> for async renders (recipe + output in R2, status in D1), or <strong>Render MP4 (sync)</strong> to stream through the Worker.
      </p>

      <form id="f">
        <label for="prompt">Prompt</label>
        <textarea id="prompt" name="prompt" placeholder="Describe the vibe, message, and pacing…"></textarea>
        <div class="row two">
          <div>
            <label for="target">Target duration (sec)</label>
            <input id="target" name="target" type="number" min="4" max="600" value="32" />
          </div>
          <div>
            <label for="max">Max duration cap (sec)</label>
            <input id="max" name="max" type="number" min="8" max="600" value="120" />
          </div>
        </div>
        <div class="actions">
          <button type="submit" id="planBtn">Plan (recipe)</button>
          <button type="button" id="renderBtn" disabled>Render MP4 (sync)</button>
          <button type="button" id="jobBtn" disabled>Queue job (R2)</button>
        </div>
      </form>

      <p class="status" id="status"></p>
      <pre id="out" hidden></pre>
    </main>
    <script>
      const $ = (id) => document.getElementById(id);
      const statusEl = $("status");
      const outEl = $("out");
      const renderBtn = $("renderBtn");
      const jobBtn = $("jobBtn");
      let lastRecipe = null;

      function apiErr(data, fallback) {
        if (!data || typeof data !== "object") return fallback;
        return [data.error, data.detail].filter(Boolean).join(": ") || fallback;
      }

      function setStatus(t) {
        statusEl.textContent = t || "";
      }

      async function plan(ev) {
        ev.preventDefault();
        const prompt = $("prompt").value.trim();
        if (!prompt) {
          setStatus("Enter a prompt.");
          return;
        }
        const targetDurationSec = Number($("target").value || 32);
        const maxDurationSec = Number($("max").value || 120);
        outEl.hidden = true;
        renderBtn.disabled = true;
        jobBtn.disabled = true;
        lastRecipe = null;
        setStatus("Planning…");
        $("planBtn").disabled = true;
        try {
          const res = await fetch("/video-ai/api/plan", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt, targetDurationSec, maxDurationSec }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || res.statusText);
          lastRecipe = data.recipe;
          outEl.textContent = JSON.stringify({ source: data.source, recipe: data.recipe }, null, 2);
          outEl.hidden = false;
          renderBtn.disabled = false;
          jobBtn.disabled = false;
          setStatus(`Recipe ready (${data.source}).`);
        } catch (e) {
          setStatus(String(e.message || e));
        } finally {
          $("planBtn").disabled = false;
        }
      }

      async function render() {
        if (!lastRecipe) return;
        setStatus("Rendering (may take a bit)…");
        renderBtn.disabled = true;
        try {
          let res = await fetch("/video-ai/api/render", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ recipe: lastRecipe }),
          });
          if (res.status === 501) {
            res = await fetch("http://127.0.0.1:8788/render", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ recipe: lastRecipe }),
            });
          }
          if (!res.ok) {
            const t = await res.text();
            throw new Error(t || res.statusText);
          }
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "video-ai-output.mp4";
          a.click();
          URL.revokeObjectURL(url);
          setStatus("Download started.");
        } catch (e) {
          setStatus(String(e.message || e));
        } finally {
          renderBtn.disabled = false;
        }
      }

      async function queueJob() {
        if (!lastRecipe) return;
        setStatus("Queueing job…");
        jobBtn.disabled = true;
        renderBtn.disabled = true;
        try {
          const res = await fetch("/video-ai/api/jobs", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ recipe: lastRecipe }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(apiErr(data, res.statusText));
          const jobId = data.jobId;
          const pollUrl = data.pollUrl || `/video-ai/api/jobs/${jobId}`;
          setStatus(`Job ${jobId} queued. Waiting for render…`);
          const deadline = Date.now() + 30 * 60 * 1000;
          while (Date.now() < deadline) {
            await new Promise((r) => setTimeout(r, 2000));
            const st = await fetch(pollUrl);
            const j = await st.json();
            if (!st.ok) throw new Error(apiErr(j, st.statusText));
            if (j.status === "completed") {
              const dl = j.downloadUrl || `/video-ai/api/jobs/${jobId}/download`;
              const a = document.createElement("a");
              a.href = dl;
              a.download = "video-ai-output.mp4";
              a.click();
              setStatus("Render finished — download started.");
              break;
            }
            if (j.status === "failed") {
              throw new Error(apiErr(j, "Job failed"));
            }
            setStatus(`Job ${jobId}: ${j.status}…`);
          }
          if (Date.now() >= deadline) setStatus("Timed out waiting for job (30 min).");
        } catch (e) {
          setStatus(String(e.message || e));
        } finally {
          jobBtn.disabled = false;
          renderBtn.disabled = !!lastRecipe;
        }
      }

      $("f").addEventListener("submit", plan);
      renderBtn.addEventListener("click", render);
      jobBtn.addEventListener("click", queueJob);
    </script>
  </body>
</html>
